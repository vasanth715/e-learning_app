spring.application.name=edusphere-backend
server.port=8080

# ==========================================
# MySQL Database Connection Configuration
# ==========================================
# To connect to your local MySQL database:
# 1. Ensure MySQL Server is running on port 3306
# 2. Update username & password below if needed
spring.datasource.url=jdbc:mysql://localhost:3306/eduspheredb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# JPA / Hibernate MySQL Dialect Settings
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# Built-in H2 Web Console (Fallback Enabled)
# ==========================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ==========================================
# JWT Security Token Settings
# ==========================================
edusphere.jwt.secret=9a6563c43a7f8e83b8a3a2f1e29c8d5c6b6a6f6d6c6e7a7b7c7d7e7f80818283
edusphere.jwt.expiration-ms=86400000
