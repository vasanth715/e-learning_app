spring.application.name=edusphere-backend
server.port=8080

# ======================================================
# Active Database Configuration (Built-In H2 DB)
# ======================================================
spring.datasource.url=jdbc:h2:mem:eduspheredb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console Settings
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ======================================================
# MySQL Connection Configuration (Uncomment to use MySQL)
# ======================================================
# spring.datasource.url=jdbc:mysql://localhost:3306/edusphere_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
edusphere.jwt.secret=9a6563c43a7f8e83b8a3a2f1e29c8d5c6b6a6f6d6c6e7a7b7c7d7e7f80818283
edusphere.jwt.expiration-ms=86400000
